<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>이벤트리 — 사이드바 앱</title><link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"><style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Pretendard',sans-serif;background:#f5f6f8;color:#191f28;-webkit-font-smoothing:antialiased;line-height:1.5}
a{text-decoration:none;color:inherit}
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.side{background:#12141a;color:#c9cfdb;padding:22px 18px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side .logo{display:flex;align-items:center;gap:9px;margin-bottom:26px;padding:0 6px}
.side .logo img{height:30px;filter:brightness(0) invert(1)}.side .logo small{font-size:11px;color:#6a7385;font-weight:600}
.side nav{display:flex;flex-direction:column;gap:3px}
.side nav a{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;font-weight:600;font-size:14.5px;color:#9aa3b5;cursor:pointer}
.side nav a .ic{width:18px;height:18px}.side nav a.on{background:#232733;color:#fff}.side nav a:hover{background:#1c1f28;color:#fff}
.side .card{margin-top:auto;background:#1c1f28;border-radius:16px;padding:16px}
.side .card b{font-size:13.5px;color:#fff}.side .card p{font-size:12px;color:#8891a3;margin:4px 0 12px}
.side .card button{width:100%;background:#5b8cff;color:#fff;border:none;border-radius:10px;padding:10px;font-weight:800;font-size:13px;cursor:pointer}
.main{padding:26px 34px 60px;min-width:0}
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.topbar h1{font-size:24px;font-weight:800;letter-spacing:-.02em}
.topbar .pills{margin-left:auto;display:flex;gap:10px}
.pill{background:#fff;border:1px solid #e9edf2;border-radius:14px;padding:9px 16px;box-shadow:0 2px 8px rgba(20,26,40,.04)}
.pill .k{font-size:10.5px;color:#8b95a1;font-weight:700}.pill .v{font-size:18px;font-weight:800;margin-top:1px}
.pill.hot .v{color:#5b8cff}
.feat{background:#fff;border:1px solid #eceff3;border-radius:22px;box-shadow:0 8px 26px rgba(20,26,40,.06);padding:22px;margin-bottom:26px;display:flex;flex-direction:column}
.feat .lbl{font-weight:800;font-size:13px;color:#8b95a1;margin-bottom:14px}
.coupondeck{position:relative;height:186px}
.coupon{position:absolute;inset:0;display:flex;background:#fbfcfe;border:1px solid #eceef2;border-radius:18px;overflow:hidden;transform-origin:center}
.coupon .stub{width:38%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px;background:color-mix(in srgb,var(--ct) 10%,#fff);border-right:2px dashed #d8dde5}
.coupon .stub img{width:96px;height:96px;object-fit:contain}.coupon .stub .rname{font-weight:800;font-size:13px;text-align:center}.coupon .stub .rvia{font-size:11px;font-weight:800;color:var(--ct)}
.notch{position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;right:-11px}.notch.top{top:-11px}.notch.bot{bottom:-11px}
.coupon .cmain{flex:1;padding:18px 22px;display:flex;flex-direction:column}
.ctop{display:flex;justify-content:space-between;align-items:center}.ccat{font-size:12.5px;font-weight:800;color:var(--ct)}.cdday{font-size:11px;font-weight:800;background:#f1f3f6;border-radius:99px;padding:3px 9px}
.cmain h3{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:6px 0 5px}.cmain p{font-size:13px;color:#8b95a1;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cfoot{display:flex;justify-content:space-between;align-items:center;margin-top:8px}.cmeta{font-size:12px;color:#8b95a1;font-weight:700}.ccta{color:#fff;border-radius:10px;padding:10px 20px;font-weight:800;font-size:13.5px}
.checkrow{background:#eef4ff;border:1px solid #dce8ff;border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:16px;margin-bottom:26px;flex-wrap:wrap}
.checkrow b{font-size:14.5px;font-weight:800}.checkrow .sub{font-size:12px;color:#5f708c;font-weight:500}
.days{display:flex;gap:6px;margin-left:auto}.day{width:34px;height:40px;border:1px solid #cfe0ff;border-radius:10px;display:grid;place-items:center;font-weight:800;font-size:12px;background:#fff}
.day.done{background:#5b8cff;color:#fff;border-color:#5b8cff}.day.today{background:#fff;color:#5b8cff;border-color:#5b8cff}
.sechead{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}.sechead h2{font-size:19px;font-weight:800}.sechead .sub{color:#8b95a1;font-size:13px;font-weight:500}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}.chip{background:#fff;border:1px solid #e9edf2;border-radius:99px;padding:8px 15px;font-weight:600;font-size:13px;cursor:pointer}.chip.on{background:#5b8cff;color:#fff;border-color:#5b8cff}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:1150px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:820px){.app{grid-template-columns:1fr}.side{display:none}.grid{grid-template-columns:repeat(2,1fr)}}
.ecard{background:#fff;border:1px solid #eceff3;border-radius:16px;overflow:hidden;box-shadow:0 4px 14px rgba(20,26,40,.05);display:flex;flex-direction:column;transition:transform .16s}.ecard:hover{transform:translateY(-3px)}
.ethumb{height:90px;display:grid;place-items:center;position:relative;overflow:hidden}.ethumb>svg{width:40px;height:40px;opacity:.85}.erimg{position:absolute;right:-6px;bottom:-6px;width:60px;height:60px;opacity:.92}
.ebadge{position:absolute;top:9px;left:9px;font-size:10.5px;font-weight:800;border-radius:99px;padding:3px 9px;background:#fff}.ebadge.live{background:#12b981;color:#fff}.ebadge.soon{background:#ffb020;color:#3a2600}.ebadge.ended{background:#e7ebf0;color:#8b95a1}
.ebody{padding:12px 14px 0;flex:1}.ecat{font-size:11px;font-weight:800}.ebody h4{font-size:15px;font-weight:800;letter-spacing:-.02em;margin:5px 0 7px}
.erew{font-size:12px;font-weight:700;background:#f6f8fb;border-radius:9px;padding:7px 10px}
.efoot{display:flex;justify-content:space-between;padding:10px 0 0;font-size:11.5px;color:#8b95a1;font-weight:600}.edday{color:#191f28;font-weight:800}
.ejoin{margin:11px 14px 14px;color:#fff;border-radius:10px;padding:9px;text-align:center;font-weight:800;font-size:13px}
.ecard.ended{opacity:.6}.ecard.ended .ejoin{background:#e7ebf0;color:#8b95a1}

/* real-photo override */
.ethumb{background:#eef1f5!important}
.ethumb .eico{display:none!important}.ethumb .enum{display:none!important}
.erimg{position:absolute!important;inset:0!important;width:100%!important;height:100%!important;object-fit:cover!important;opacity:1!important;filter:none!important;border-radius:0!important;right:auto!important;bottom:auto!important;top:auto!important;left:auto!important}
.ebadge{z-index:3}
.coupon .stub{padding:0!important;overflow:hidden;border-right:0!important}
.coupon .stub img{position:absolute!important;inset:0!important;width:100%!important;height:100%!important;object-fit:cover!important;filter:none!important}
.coupon .stub::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.72));z-index:1}
.coupon .stub .rname{position:absolute!important;left:12px;right:12px;bottom:30px;z-index:2;color:#fff!important;text-align:left}
.coupon .stub .rvia{position:absolute!important;left:12px;right:12px;bottom:12px;z-index:2;color:#fff!important;opacity:.92}
.coupon .stub .notch{z-index:4}
</style></head><body>
<div class="app">
 <aside class="side">
   <div class="logo"><img src="assets/logos/logo03.svg"><small>by Bridge34</small></div>
   <nav>
     <a class="on"><span class="ic">🏠</span> 홈</a>
     <a><span class="ic">🎟️</span> 쿠폰 이벤트</a>
     <a><span class="ic">🎫</span> 출석·이벤트</a>
     <a><span class="ic">🪙</span> 토큰 분배</a>
     <a><span class="ic">🎮</span> 게임 이벤트</a>
     <a><span class="ic">🔥</span> 데일리 체크인</a>
   </nav>
   <div class="card"><b>로그인하고 시작</b><p>구글로 3초 만에 참여하세요</p><button>Google로 시작</button></div>
 </aside>
 <main class="main">
   <div class="topbar"><h1>이벤트 홈</h1>
     <div class="pills">
       <div class="pill hot"><div class="k">진행 중 리워드</div><div class="v" id="tRew">₩0</div></div>
       <div class="pill"><div class="k">진행 중</div><div class="v" id="tLive">0</div></div>
       <div class="pill"><div class="k">누적 참여</div><div class="v" id="tPpl">0</div></div>
     </div>
   </div>
   <div class="feat"><div class="lbl">🔥 지금 진행 중 · 넘겨보세요</div><div class="coupondeck" id="cdeck"></div></div>
   <div class="checkrow"><span style="font-size:22px">🔥</span><div><b>7일 연속 출석 챌린지</b><div class="sub">매일 출석하고 7일 채우면 스타벅스 기프티콘 · 쿠포니 지급</div></div><div class="days" id="days"></div></div>
   <div class="sechead"><h2>전체 이벤트</h2><span class="sub">지금 참여할 수 있는 모든 이벤트</span></div>
   <div class="chips" id="chips"></div>
   <div class="grid" id="grid"></div>
 </main>
</div>
<script src="data.js"></script><script>
const RVAL={'스타벅스 기프티콘':4500,'아메리카노 기프티콘':4500,'웰컴 기프트':10000,'POT 토큰':8000,'현장 경품':30000,'버거세트 1+1':9000,'주간 경품':20000};
const TYPE={checkin:{c:'#ff5a6a',ico:'flame'},coupon:{c:'#f6a723',ico:'ticket'},event:{c:'#12b981',ico:'cal'},pot:{c:'#8b5cf6',ico:'coin'},game:{c:'#3b82f6',ico:'game'}};
const ICONS={flame:'<path d="M12 2c1 3-1 4-1 6 0 1 1 2 2 2s1-1 1-2c2 2 3 4 3 7a5 5 0 01-10 0c0-3 2-5 3-7 1-2 2-3 2-5z"/>',ticket:'<path d="M3 8a2 2 0 012-2h14a2 2 0 012 2 2 2 0 000 4 2 2 0 010 4 2 2 0 01-2 2H5a2 2 0 01-2-2 2 2 0 010-4 2 2 0 000-4z"/>',cal:'<rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 9h18M8 3v4M16 3v4M8.5 15l2.5 2.5L16 12"/>',coin:'<circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5c0-1.2 1.1-2 2.5-2s2.5.8 2.5 2-1.1 2-2.5 2-2.5.8-2.5 2 1.1 2 2.5 2 2.5-.8 2.5-2"/>',game:'<rect x="2" y="7" width="20" height="11" rx="5.5"/><path d="M7 11v3M5.5 12.5h3M15.5 11.5h.01M18 13.5h.01"/>'};
function ico(n,s){return `<svg viewBox="0 0 24 24" fill="${n==='flame'?s:'none'}" stroke="${s}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">${ICONS[n]}</svg>`}
function rimg(e){const r=e.reward;if(/스타벅스|아메리카노|커피/.test(r))return'coffee';if(/버거/.test(r))return'burger';if(e.type==='pot'||/토큰/.test(r))return'coin';if(e.type==='game'||/경품/.test(r))return'game';if(e.type==='event'||/웰컴|기프트/.test(r))return'gift';return'ticket'}
const live=EVENTS.filter(e=>e.status==='live');
const $=id=>document.getElementById(id);
// stats
const totRew=live.reduce((s,e)=>s+(RVAL[e.reward]||0),0);
const ppl=EVENTS.reduce((s,e)=>s+parseInt(((e.meta.match(/[\d,]+/)||['0'])[0]).replace(/,/g,''))||0,0);
function anim(el,to,fmt){if(!el)return;let t=0,st=to/40;const i=setInterval(()=>{t+=st;if(t>=to){t=to;clearInterval(i)}el.textContent=fmt(Math.floor(t))},18)}
anim($('tRew'),totRew,v=>'₩'+v.toLocaleString());anim($('tLive'),live.length,v=>v+'개');anim($('tPpl'),ppl,v=>v.toLocaleString()+'명');
// checkin
if($('days')){for(let i=1;i<=7;i++){const d=document.createElement('div');d.className='day'+(i<5?' done':i===5?' today':'');d.textContent=i<5?'✓':i;$('days').appendChild(d)}}
// coupon carousel (compact)
if($('cdeck')){
  const cdeck=$('cdeck');let order=live.map((_,i)=>i),pt=null;
  live.forEach((e,i)=>{const t=TYPE[e.type]||TYPE.coupon;const c=document.createElement('div');c.className='coupon';c.dataset.i=i;c.style.setProperty('--ct',t.c);
   c.innerHTML=`<div class="stub"><div class="notch top"></div><div class="notch bot"></div><img src="assets/photos/${rimg(e)}.jpg"><div class="rname">${e.reward}</div><div class="rvia">${e.reward_via} 지급</div></div>
    <div class="cmain"><div class="ctop"><span class="ccat">${e.emoji} ${e.cat}</span><span class="cdday">${e.dday}</span></div><h3>${e.title}</h3><p>${e.desc}</p>
    <div class="cfoot"><span class="cmeta">👥 ${e.meta}</span><a class="ccta" href="${e.handoff}" target="_blank">참여 →</a></div></div>`;
   cdeck.appendChild(c)});
  function lay(){[...cdeck.children].forEach(el=>{const pos=order.indexOf(+el.dataset.i),d=Math.min(pos,3);el.style.transition='transform .5s cubic-bezier(.2,.85,.3,1),opacity .4s';el.style.transform=`translateY(${d*10}px) scale(${1-d*0.03})`;el.style.zIndex=50-pos;el.style.opacity=pos>3?0:1;el.style.pointerEvents=pos===0?'auto':'none'})}
  function adv(){const el=cdeck.children[order[0]];el.style.transition='transform .3s,opacity .3s';el.style.transform='translateX(-115%) rotate(-6deg)';el.style.opacity='0';setTimeout(()=>{order.push(order.shift());lay()},240)}
  lay();pt=setInterval(adv,2400);cdeck.addEventListener('mouseenter',()=>clearInterval(pt));cdeck.addEventListener('mouseleave',()=>pt=setInterval(adv,2400));
}
// grid
if($('grid')){
  const grid=$('grid'),chipEl=$('chips');const cats=['전체',...new Set(EVENTS.map(e=>e.cat))];let ac='전체';
  if(chipEl)cats.forEach(c=>{const b=document.createElement('button');b.className='chip'+(c==='전체'?' on':'');b.textContent=c;b.onclick=()=>{ac=c;[...chipEl.children].forEach(x=>x.classList.toggle('on',x.textContent===c));render()};chipEl.appendChild(b)});
  function render(){grid.innerHTML='';EVENTS.filter(e=>ac==='전체'||e.cat===ac).forEach(e=>{const t=TYPE[e.type]||TYPE.coupon,st=e.status,lb=st==='live'?'LIVE':st==='soon'?'SOON':'종료';
    const c=document.createElement('div');c.className='ecard'+(st==='ended'?' ended':'');
    c.innerHTML=`<div class="ethumb" style="background:${t.c}1f">${ico(t.ico,t.c)}<span class="ebadge ${st}">${lb}</span><img class="erimg" src="assets/photos/${rimg(e)}.jpg"></div>
      <div class="ebody"><div class="ecat" style="color:${t.c}">${e.emoji} ${e.cat}</div><h4>${e.title}</h4>
      <div class="erew">🎁 ${e.reward} <b style="color:${t.c}">· ${e.reward_via}</b></div>
      <div class="efoot"><span class="edday">${e.dday}</span><span>${e.meta}</span></div></div>
      <a class="ejoin" style="background:${st==='ended'?'':t.c}" href="${e.handoff}" target="_blank">${st==='ended'?'종료':'참여하기 →'}</a>`;
    grid.appendChild(c)})}
  render();
}
</script></body></html>
