<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>이벤트리 — 벤토 그리드</title><link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"><style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Pretendard',sans-serif;background:#eceef2;color:#161a22;-webkit-font-smoothing:antialiased;line-height:1.5}
a{text-decoration:none;color:inherit}
.wrap{max-width:1200px;margin:0 auto;padding:26px 22px 60px}
.topnav{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.topnav img{height:34px;mix-blend-mode:multiply}.topnav small{color:#7b8494;font-weight:600;font-size:12px}
.topnav .g{margin-left:auto;background:#161a22;color:#fff;border:none;border-radius:12px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer}
.bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:150px;gap:16px}
.tile{border-radius:24px;padding:24px;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(20,26,40,.06)}
.t-hero{grid-column:span 2;grid-row:span 2;background:#161a22;color:#fff;display:flex;flex-direction:column;justify-content:space-between}
.t-hero h1{font-size:34px;font-weight:800;letter-spacing:-.035em;line-height:1.12}.t-hero h1 .hl{color:#c6f24a}
.t-hero p{color:#aab2c2;font-weight:500;font-size:14px;margin-top:10px}
.t-hero .g{background:#c6f24a;color:#161a22;border:none;border-radius:12px;padding:12px 20px;font-weight:800;font-size:14px;cursor:pointer;align-self:flex-start}
.t-coupon{grid-column:span 2;grid-row:span 2;background:#fff;padding:20px;display:flex;flex-direction:column}
.t-coupon .lbl{font-weight:800;font-size:13px;color:#7b8494;margin-bottom:12px}
.coupondeck{position:relative;flex:1;min-height:0}
.coupon{position:absolute;inset:0;display:flex;background:#fbfcfe;border:1px solid #eceef2;border-radius:18px;overflow:hidden;transform-origin:center}
.coupon .stub{width:42%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px;background:color-mix(in srgb,var(--ct) 10%,#fff);border-right:2px dashed #d8dde5}
.coupon .stub img{width:88px;height:88px;object-fit:contain}.coupon .stub .rname{font-weight:800;font-size:12.5px;text-align:center}.coupon .stub .rvia{font-size:10.5px;font-weight:800;color:var(--ct)}
.notch{position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;right:-10px}.notch.top{top:-10px}.notch.bot{bottom:-10px}
.coupon .cmain{flex:1;padding:14px 16px;display:flex;flex-direction:column}
.ctop{display:flex;justify-content:space-between;align-items:center}.ccat{font-size:11.5px;font-weight:800;color:var(--ct)}.cdday{font-size:10.5px;font-weight:800;background:#f1f3f6;border-radius:99px;padding:2px 8px}
.cmain h3{font-size:17px;font-weight:800;letter-spacing:-.02em;margin:5px 0 4px;line-height:1.2}.cmain p{font-size:11.5px;color:#8b95a1;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cfoot{display:flex;justify-content:space-between;align-items:center;margin-top:6px}.cmeta{font-size:10.5px;color:#8b95a1;font-weight:700}.ccta{color:#fff;border-radius:9px;padding:7px 14px;font-weight:800;font-size:12px}
.t-stat{display:flex;flex-direction:column;justify-content:center}
.t-stat .k{font-size:12px;font-weight:700;opacity:.7}.t-stat .v{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:4px}
.t-rew{background:#ffb020;color:#3a2600}.t-live{background:#12b981;color:#04271c}.t-ppl{background:#8b5cf6;color:#1e0a3a}
.t-check{grid-column:span 2;background:#fff;display:flex;flex-direction:column;justify-content:center;gap:12px}
.t-check b{font-size:15px;font-weight:800}.t-check .sub{font-size:12px;color:#8b95a1;font-weight:500}
.days{display:flex;gap:6px}.day{flex:1;height:38px;border:1px solid #eceef2;border-radius:10px;display:grid;place-items:center;font-weight:800;font-size:12px}
.day.done{background:#ff5a6a;color:#fff;border-color:#ff5a6a}.day.today{background:#fff0d6;color:#c98200;border-color:#ffcf80}
.t-cats{grid-column:span 2;background:#fff;display:flex;flex-direction:column;justify-content:center;gap:10px}
.t-cats .k{font-weight:800;font-size:13px;color:#7b8494}
.t-cats .cc{display:flex;flex-wrap:wrap;gap:7px}
.t-cats .cc span{border:1px solid #eceef2;border-radius:99px;padding:7px 13px;font-weight:700;font-size:12.5px;cursor:pointer}
/* grid */
.sec2{margin-top:38px}.sec2 h2{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:16px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.chip{background:#fff;border:1px solid #e6e9ee;border-radius:99px;padding:8px 15px;font-weight:600;font-size:13px;cursor:pointer}.chip.on{background:#161a22;color:#fff;border-color:#161a22}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}.bento{grid-template-columns:repeat(2,1fr)}.t-hero,.t-coupon,.t-check,.t-cats{grid-column:span 2}}
.ecard{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 8px 24px rgba(20,26,40,.06);display:flex;flex-direction:column;transition:transform .16s}.ecard:hover{transform:translateY(-4px)}
.ethumb{height:96px;display:grid;place-items:center;position:relative;overflow:hidden}.ethumb>svg{width:44px;height:44px;opacity:.85}.erimg{position:absolute;right:-8px;bottom:-8px;width:66px;height:66px;opacity:.9}
.ebadge{position:absolute;top:9px;left:9px;font-size:10.5px;font-weight:800;border-radius:99px;padding:3px 9px;background:#fff}.ebadge.live{background:#12b981;color:#fff}.ebadge.soon{background:#ffb020;color:#3a2600}.ebadge.ended{background:#e7ebf0;color:#8b95a1}
.ebody{padding:13px 15px 0;flex:1}.ecat{font-size:11px;font-weight:800}.ebody h4{font-size:15px;font-weight:800;letter-spacing:-.02em;margin:5px 0 7px;line-height:1.25}
.erew{font-size:12px;font-weight:700;background:#f6f8fb;border-radius:9px;padding:7px 10px}
.efoot{display:flex;justify-content:space-between;padding:11px 0 0;font-size:11.5px;color:#8b95a1;font-weight:600}.edday{color:#161a22;font-weight:800}
.ejoin{margin:12px 15px 15px;color:#fff;border-radius:10px;padding:10px;text-align:center;font-weight:800;font-size:13.5px}
.ecard.ended{opacity:.6}.ecard.ended .ejoin{background:#e7ebf0;color:#8b95a1}
footer{margin-top:44px;text-align:center;color:#8b95a1;font-size:13px;font-weight:600}

/* real-photo override */
.ethumb{background:#eef1f5!important}
.ethumb .eico{display:none!important}.ethumb .enum{display:none!important}
.erimg{position:absolute!important;inset:0!important;width:100%!important;height:100%!important;object-fit:cover!important;opacity:1!important;filter:none!important;border-radius:0!important;right:auto!important;bottom:auto!important;top:auto!important;left:auto!important}
.ebadge{z-index:3}
.coupon .stub{padding:0!important;overflow:hidden;border-right:0!important}
.coupon .stub img{position:absolute!important;inset:0!important;width:100%!important;height:100%!important;object-fit:cover!important;filter:none!important}
.coupon .stub::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.72));z-index:1}
.coupon .stub .rname{position:absolute!important;left:12px;right:12px;bottom:30px;z-index:2;color:#fff!important;text-align:left}
.coupon .stub .rvia{position:absolute!important;left:12px;right:12px;bottom:12px;z-index:2;color:#fff!important;opacity:.92}
.coupon .stub .notch{z-index:4}
</style></head><body>
<div class="wrap">
 <div class="topnav"><img src="assets/logos/logo03.svg"><small>by Bridge34</small>
  <button class="g">Google로 시작</button></div>
 <div class="bento">
  <div class="tile t-hero"><div><h1>검증된 이벤트,<br><span class="hl">이벤트리</span> 한 곳에서.</h1><p>쿠폰·출석·에어드랍·현장게임까지 원클릭.</p></div><button class="g">Google로 시작 →</button></div>
  <div class="tile t-coupon"><div class="lbl">🔥 지금 진행 중</div><div class="coupondeck" id="cdeck"></div></div>
  <div class="tile t-stat t-rew"><div class="k">진행 중 리워드</div><div class="v" id="tRew">₩0</div></div>
  <div class="tile t-stat t-live"><div class="k">진행 중 이벤트</div><div class="v" id="tLive">0</div></div>
  <div class="tile t-check"><div><b>🔥 7일 연속 출석 챌린지</b><div class="sub">매일 출석하고 7일 채우면 스타벅스 기프티콘</div></div><div class="days" id="days"></div></div>
  <div class="tile t-stat t-ppl"><div class="k">누적 참여</div><div class="v" id="tPpl">0</div></div>
  <div class="tile t-cats"><div class="k">카테고리</div><div class="cc"><span>🎟️ 쿠폰</span><span>🎫 출석</span><span>🪙 토큰</span><span>🎮 게임</span><span>🔥 체크인</span></div></div>
 </div>
 <div class="sec2"><h2>전체 이벤트</h2><div class="chips" id="chips"></div><div class="grid" id="grid"></div></div>
 <footer>Powered by Bridge34</footer>
</div>
<script src="data.js"></script><script>
const RVAL={'스타벅스 기프티콘':4500,'아메리카노 기프티콘':4500,'웰컴 기프트':10000,'POT 토큰':8000,'현장 경품':30000,'버거세트 1+1':9000,'주간 경품':20000};
const TYPE={checkin:{c:'#ff5a6a',ico:'flame'},coupon:{c:'#f6a723',ico:'ticket'},event:{c:'#12b981',ico:'cal'},pot:{c:'#8b5cf6',ico:'coin'},game:{c:'#3b82f6',ico:'game'}};
const ICONS={flame:'<path d="M12 2c1 3-1 4-1 6 0 1 1 2 2 2s1-1 1-2c2 2 3 4 3 7a5 5 0 01-10 0c0-3 2-5 3-7 1-2 2-3 2-5z"/>',ticket:'<path d="M3 8a2 2 0 012-2h14a2 2 0 012 2 2 2 0 000 4 2 2 0 010 4 2 2 0 01-2 2H5a2 2 0 01-2-2 2 2 0 010-4 2 2 0 000-4z"/>',cal:'<rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 9h18M8 3v4M16 3v4M8.5 15l2.5 2.5L16 12"/>',coin:'<circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5c0-1.2 1.1-2 2.5-2s2.5.8 2.5 2-1.1 2-2.5 2-2.5.8-2.5 2 1.1 2 2.5 2 2.5-.8 2.5-2"/>',game:'<rect x="2" y="7" width="20" height="11" rx="5.5"/><path d="M7 11v3M5.5 12.5h3M15.5 11.5h.01M18 13.5h.01"/>'};
function ico(n,s){return `<svg viewBox="0 0 24 24" fill="${n==='flame'?s:'none'}" stroke="${s}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">${ICONS[n]}</svg>`}
function rimg(e){const r=e.reward;if(/스타벅스|아메리카노|커피/.test(r))return'coffee';if(/버거/.test(r))return'burger';if(e.type==='pot'||/토큰/.test(r))return'coin';if(e.type==='game'||/경품/.test(r))return'game';if(e.type==='event'||/웰컴|기프트/.test(r))return'gift';return'ticket'}
const live=EVENTS.filter(e=>e.status==='live');
const $=id=>document.getElementById(id);
// stats
const totRew=live.reduce((s,e)=>s+(RVAL[e.reward]||0),0);
const ppl=EVENTS.reduce((s,e)=>s+parseInt(((e.meta.match(/[\d,]+/)||['0'])[0]).replace(/,/g,''))||0,0);
function anim(el,to,fmt){if(!el)return;let t=0,st=to/40;const i=setInterval(()=>{t+=st;if(t>=to){t=to;clearInterval(i)}el.textContent=fmt(Math.floor(t))},18)}
anim($('tRew'),totRew,v=>'₩'+v.toLocaleString());anim($('tLive'),live.length,v=>v+'개');anim($('tPpl'),ppl,v=>v.toLocaleString()+'명');
// checkin
if($('days')){for(let i=1;i<=7;i++){const d=document.createElement('div');d.className='day'+(i<5?' done':i===5?' today':'');d.textContent=i<5?'✓':i;$('days').appendChild(d)}}
// coupon carousel (compact)
if($('cdeck')){
  const cdeck=$('cdeck');let order=live.map((_,i)=>i),pt=null;
  live.forEach((e,i)=>{const t=TYPE[e.type]||TYPE.coupon;const c=document.createElement('div');c.className='coupon';c.dataset.i=i;c.style.setProperty('--ct',t.c);
   c.innerHTML=`<div class="stub"><div class="notch top"></div><div class="notch bot"></div><img src="assets/photos/${rimg(e)}.jpg"><div class="rname">${e.reward}</div><div class="rvia">${e.reward_via} 지급</div></div>
    <div class="cmain"><div class="ctop"><span class="ccat">${e.emoji} ${e.cat}</span><span class="cdday">${e.dday}</span></div><h3>${e.title}</h3><p>${e.desc}</p>
    <div class="cfoot"><span class="cmeta">👥 ${e.meta}</span><a class="ccta" href="${e.handoff}" target="_blank">참여 →</a></div></div>`;
   cdeck.appendChild(c)});
  function lay(){[...cdeck.children].forEach(el=>{const pos=order.indexOf(+el.dataset.i),d=Math.min(pos,3);el.style.transition='transform .5s cubic-bezier(.2,.85,.3,1),opacity .4s';el.style.transform=`translateY(${d*10}px) scale(${1-d*0.03})`;el.style.zIndex=50-pos;el.style.opacity=pos>3?0:1;el.style.pointerEvents=pos===0?'auto':'none'})}
  function adv(){const el=cdeck.children[order[0]];el.style.transition='transform .3s,opacity .3s';el.style.transform='translateX(-115%) rotate(-6deg)';el.style.opacity='0';setTimeout(()=>{order.push(order.shift());lay()},240)}
  lay();pt=setInterval(adv,2400);cdeck.addEventListener('mouseenter',()=>clearInterval(pt));cdeck.addEventListener('mouseleave',()=>pt=setInterval(adv,2400));
}
// grid
if($('grid')){
  const grid=$('grid'),chipEl=$('chips');const cats=['전체',...new Set(EVENTS.map(e=>e.cat))];let ac='전체';
  if(chipEl)cats.forEach(c=>{const b=document.createElement('button');b.className='chip'+(c==='전체'?' on':'');b.textContent=c;b.onclick=()=>{ac=c;[...chipEl.children].forEach(x=>x.classList.toggle('on',x.textContent===c));render()};chipEl.appendChild(b)});
  function render(){grid.innerHTML='';EVENTS.filter(e=>ac==='전체'||e.cat===ac).forEach(e=>{const t=TYPE[e.type]||TYPE.coupon,st=e.status,lb=st==='live'?'LIVE':st==='soon'?'SOON':'종료';
    const c=document.createElement('div');c.className='ecard'+(st==='ended'?' ended':'');
    c.innerHTML=`<div class="ethumb" style="background:${t.c}1f">${ico(t.ico,t.c)}<span class="ebadge ${st}">${lb}</span><img class="erimg" src="assets/photos/${rimg(e)}.jpg"></div>
      <div class="ebody"><div class="ecat" style="color:${t.c}">${e.emoji} ${e.cat}</div><h4>${e.title}</h4>
      <div class="erew">🎁 ${e.reward} <b style="color:${t.c}">· ${e.reward_via}</b></div>
      <div class="efoot"><span class="edday">${e.dday}</span><span>${e.meta}</span></div></div>
      <a class="ejoin" style="background:${st==='ended'?'':t.c}" href="${e.handoff}" target="_blank">${st==='ended'?'종료':'참여하기 →'}</a>`;
    grid.appendChild(c)})}
  render();
}
</script></body></html>
